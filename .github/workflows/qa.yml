name: QA Health Check

on:
  pull_request:
    branches: [main]

jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps

      - name: Run tests
        run: bun test

      - name: QA smoke test
        run: |
          echo "QA health check passed"
          # Future: run browse-based QA with health score threshold
          # bun run skills/qa/run.ts --mode quick --threshold 70
